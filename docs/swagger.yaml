definitions:
  main.ErrorResponse:
    properties:
      error:
        example: invalid json
        type: string
    type: object
  main.HealthResponse:
    properties:
      runtime:
        example: 38271.133967079s
        type: string
      status:
        example: OK
        type: string
    type: object
  main.SessionCreateRequest:
    properties:
      session_timeout:
        example: 7200
        type: integer
      ttl:
        example: 3600
        type: integer
    type: object
  main.SessionCreateResponse:
    properties:
      parameters:
        $ref: '#/definitions/main.SessionCreateRequest'
      token:
        example: 3A9N2O
        type: string
    type: object
  main.SessionTerminateRequest:
    properties:
      token:
        example: 3A9N2O
        type: string
    type: object
  main.SessionTerminateResponse:
    properties:
      message:
        example: successfully terminated session.
        type: string
      token:
        example: 3A9N2O
        type: string
    type: object
  main.SessionUpdateRequest:
    properties:
      latitude:
        example: 8.385259
        type: number
      longitude:
        example: 49.026598
        type: number
      token:
        example: 3A9N2O
        type: string
    type: object
  main.SessionUpdateResponse:
    properties:
      message:
        example: successfully updated session.
        type: string
      token:
        example: 3A9N2O
        type: string
    type: object
info:
  contact: {}
paths:
  /health:
    get:
      description: Returns service health and runtime information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.HealthResponse'
      summary: Health check
      tags:
      - health
  /session/create:
    post:
      consumes:
      - application/json
      description: Creates a new session with the given TTL and session timeout
      parameters:
      - description: Session create payload
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/main.SessionCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SessionCreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create a new session
      tags:
      - session
  /session/terminate:
    post:
      consumes:
      - application/json
      description: Terminates an active session by its token
      parameters:
      - description: Session terminate payload
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/main.SessionTerminateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: successfully terminated session.
          schema:
            $ref: '#/definitions/main.SessionTerminateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Terminate a session
      tags:
      - session
  /session/update:
    post:
      consumes:
      - application/json
      description: Updates the location information (longitude & latitude) of an active
        session identified by its token.
      parameters:
      - description: Session update payload
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/main.SessionUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Session updated.
          schema:
            $ref: '#/definitions/main.SessionUpdateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Update a session
      tags:
      - session
swagger: "2.0"
