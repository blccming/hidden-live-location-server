definitions:
  api.ErrorResponse:
    properties:
      error:
        example: invalid json
        type: string
    type: object
  api.HealthResponse:
    properties:
      runtime:
        example: 38271.133967079s
        type: string
      status:
        example: OK
        type: string
    type: object
  api.SessionCreateRequest:
    properties:
      session_timeout:
        example: 7200
        type: integer
      ttl:
        example: 3600
        type: integer
    type: object
  api.SessionCreateResponse:
    properties:
      parameters:
        $ref: '#/definitions/api.SessionCreateRequest'
      token:
        example: 3A9N2O
        type: string
    type: object
  api.SessionGetResponse:
    properties:
      last_update:
        example: "2026-03-01T13:23:45.206365244+01:00"
        type: string
      latitude:
        example: 8.385259
        type: number
      longitude:
        example: 49.026598
        type: number
      token:
        example: 3A9N2O
        type: string
    type: object
  api.SessionTerminateRequest:
    properties:
      token:
        example: 3A9N2O
        type: string
    type: object
  api.SessionTerminateResponse:
    properties:
      message:
        example: successfully terminated session.
        type: string
      token:
        example: 3A9N2O
        type: string
    type: object
  api.SessionUpdateRequest:
    properties:
      latitude:
        example: 8.385259
        type: number
      longitude:
        example: 49.026598
        type: number
      token:
        example: 3A9N2O
        type: string
    type: object
  api.SessionUpdateResponse:
    properties:
      message:
        example: successfully updated session.
        type: string
      token:
        example: 3A9N2O
        type: string
    type: object
info:
  contact: {}
paths:
  /health:
    get:
      description: Returns service health and runtime information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthResponse'
      summary: Health check
      tags:
      - health
  /session/{token}:
    get:
      consumes:
      - application/json
      description: Fetches the current longitude, latitude and last‑update timestamp
        for a session identified by its token.
      parameters:
      - description: Session token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Session retrieved.
          schema:
            $ref: '#/definitions/api.SessionGetResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Retrieve a session
      tags:
      - session
  /session/create:
    post:
      consumes:
      - application/json
      description: Creates a new session with the given TTL and session timeout
      parameters:
      - description: Session create payload
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/api.SessionCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionCreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Create a new session
      tags:
      - session
  /session/terminate:
    post:
      consumes:
      - application/json
      description: Terminates an active session by its token
      parameters:
      - description: Session terminate payload
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/api.SessionTerminateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: successfully terminated session.
          schema:
            $ref: '#/definitions/api.SessionTerminateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Terminate a session
      tags:
      - session
  /session/update:
    post:
      consumes:
      - application/json
      description: Updates the location information (longitude & latitude) of an active
        session identified by its token.
      parameters:
      - description: Session update payload
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/api.SessionUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Session updated.
          schema:
            $ref: '#/definitions/api.SessionUpdateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Update a session
      tags:
      - session
swagger: "2.0"
